services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: leadgen
      POSTGRES_PASSWORD: leadgen_local
      POSTGRES_DB: leadgen
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadgen"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
